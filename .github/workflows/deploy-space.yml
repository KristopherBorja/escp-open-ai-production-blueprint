name: Deploy Hugging Face Space

on:
  workflow_run:
    workflows:
      - Verify
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-hugging-face-space
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-space
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == 'KristopherBorja/escp-open-ai-production-blueprint'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: hugging-face

    steps:
      - name: Check out the verified commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Use the pinned Node.js line
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.18.0

      - name: Mirror the exact verified commit to the public Static Space
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/deploy-space.mjs
