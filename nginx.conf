server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://*.hf.co; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'self' https://huggingface.co; upgrade-insecure-requests" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ \.mjs$ {
    types {
      application/javascript mjs;
    }
    try_files $uri =404;
  }

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }
}
